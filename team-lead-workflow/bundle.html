ild before planning starts. Produces a structured product brief at docs/briefs/{project-name}.md.`},{name:`explore`,badge:`READ-ONLY`,badgeColor:`#0369a1`,badgeBg:`#e0f2fe`,desc:`Search, glob, grep, file reads. No write or command access. Use for reconnaissance and codebase mapping.`},{name:`general`,badge:`FULL ACCESS`,badgeColor:`#166534`,badgeBg:`#dcfce7`,desc:`Read, edit, write, bash. All permissions. Use for any implementation, refactoring, or system command.`},{name:`review-manager`,badge:`SUB-AGENT`,badgeColor:`#92400e`,badgeBg:`#fef3c7`,desc:`Review orchestrator. Spawns code-reviewer, security-reviewer and requirements-reviewer in parallel, then arbitrates verdicts.`},{name:`bug-finder`,badge:`DIAGNOSTIC`,badgeColor:`#991b1b`,badgeBg:`#fee2e2`,desc:`Structured bug investigation. Forces full root-cause analysis before any fix — prevents workarounds and code divergence.`}],section_usecases:`Typical Use Cases`,usecases:[{label:`Implement a feature`,steps:[`explore maps the codebase`,`general implements`,`review-manager validates`],color:`#2563eb`},{label:`Fix a bug`,steps:[`bug-finder diagnoses the root-cause`,`general applies the fix`,`review-manager reviews`],color:`#dc2626`},{label:`Refactoring`,steps:[`explore maps dependencies`,`general refactors`,`review-manager approves`],color:`#7c3aed`},{label:`Security audit`,steps:[`review-manager spawns security-reviewer`,`vulnerability report`,`escalate if BLOCKED`],color:`#b45309`}],cta_config:`Configuration →`,back_to_intro:`← Back`,nav_config:`Configuration`,nav_workflow:`Workflow →`,config_title:`Configuration`,config_subtitle:`Per-agent overrides in opencode.json`,config_intro_heading:`How it works`,config_intro_body:`All agents can be configured per-agent in your opencode.json. The plugin applies its defaults first; your config overrides on top. The prompt field is always controlled by the plugin and cannot be overridden.`,config_merge_heading:`Merge strategy`,config_merge_body:`Top-level fields (temperature, variant, mode, color) are replaced by your value when present. Permission tool maps (bash, read, edit) are shallow-merged — your entries are additive, not a replacement.`,config_merge_note:`Example: adding npm run* to bash permissions extends the default git allowlist. Both sets of commands will be allowed.`,config_fields_heading:`Configurable fields — all agents`,config_fields_caption:`These fields apply to every agent registered by the plugin.`,config_fields:[{field:`temperature`,type:`number`,default:`varies`,description:`LLM sampling temperature. Lower = more deterministic.`},{field:`variant`,type:`string`,default:`"max"`,description:`Model variant: "max" for best quality, "fast" for speed.`},{field:`mode`,type:`string`,default:`varies`,description:`"all" = visible in agent list + usable as sub-agent. "subagent" = sub-agent only, invisible in main UI.`},{field:`color`,type:`string`,default:`varies`,description:`UI accent color: "error", "warning", "info", "success".`},{field:`description`,type:`string`,default:`hardcoded`,description:`Agent description shown in the UI.`},{field:`permission`,type:`object`,default:`varies`,description:`Tool access control map. Shallow-merged with plugin defaults for nested tools (bash, read, edit).`}],config_soul_heading:`team-lead only`,config_soul_fields:[{field:`soul`,type:`boolean`,default:`true`,description:`Append the human-tone personality directives to Orion's prompt. Set false for raw behavior.`}],config_defaults_heading:`Agent defaults`,config_defaults_expand:`Show details`,config_defaults_collapse:`Hide`,config_agent_defaults:[{name:`team-lead`,temperature:`0.3`,variant:`max`,mode:`all`,color:`error`,permissions:[`task: allow`,`todowrite: allow`,`todoread: allow`,`skill: allow`,`question: allow`,`distill: allow`,`prune: allow`,`compress: allow`,`read: allow (.opencode/scratchpad.md, .opencode/memory.md)`,`edit: allow (.opencode/scratchpad.md, .opencode/memory.md)`,`bash: allow (git status/diff/log/add/commit/push/tag o r un nœud →`,flowchart_subtitle:`Orchestrateur pur · délègue tout · ne touche jamais au code`,section_concept:`Concept & philosophie`,concept_items:[{icon:`⊘`,text:`Ne touche jamais au code directement — toute action technique est déléguée`},{icon:`◈`,text:`Planifie, délègue, review, synthétise — dans cet ordre, toujours`},{icon:`⟳`,text:`Délibéré et méthodique — temperature 0.3, variant max`},{icon:`✦`,text:`Mémoire persistante via scratchpad + memory.md, survit aux resets de contexte`},{icon:`◉`,text:`Ton façonné par les directives human-tone — direct, tranché, concis. Désactivable via %%code%% dans la config.`,code:`soul: false`}],section_memory:`Gestion de la mémoire`,scratchpad_label:`Scratchpad`,scratchpad_items:[`État de la mission courante`,`Écrasé à chaque nouvelle mission`,`Survit à la compaction de contexte`,`Lu et écrit à 5 moments clés du workflow`],memory_label:`Memory`,memory_items:[`Connaissances projet inter-sessions`,`Injecté dans chaque appel LLM automatiquement`,`Append-only — jamais écrasé`,`Commandes build, conventions, décisions archi`],section_agents:`Les agents disponibles`,agents:[{name:`brainstorm`,badge:`PHASE 0`,badgeColor:`#6d28d9`,badgeBg:`#ede9fe`,desc:`Agent de découverte. Vous aide à articuler ce que vous voulez construire avant la planification. Produit un product brief dans docs/briefs/{project-name}.md.`},{name:`explore`,badge:`READ-ONLY`,badgeColor:`#0369a1`,badgeBg:`#e0f2fe`,desc:`Recherche, glob, grep, lecture de fichiers. Aucun droit d'écriture ni de commande. Usage : reconnaissance et cartographie du codebase.`},{name:`general`,badge:`FULL ACCESS`,badgeColor:`#166534`,badgeBg:`#dcfce7`,desc:`Lecture, édition, écriture, bash. Toutes les permissions. Usage : toute implémentation, refactoring, ou commande système.`},{name:`review-manager`,badge:`SUB-AGENT`,badgeColor:`#92400e`,badgeBg:`#fef3c7`,desc:`Orchestrateur de review. Spawne code-reviewer, security-reviewer et requirements-reviewer en parallèle, puis arbitre les verdicts
