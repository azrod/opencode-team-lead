name: Publish to npm

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Configure npm registry
        run: echo "registry=https://registry.npmjs.org/" > ~/.npmrc

      - name: Set version and detect prerelease
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          echo "number=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *-* ]]; then
            echo "IS_PRERELEASE=true" >> "$GITHUB_ENV"
          else
            echo "IS_PRERELEASE=false" >> "$GITHUB_ENV"
          fi

      - name: Publish stable
        if: env.IS_PRERELEASE == 'false'
        run: npm publish --access public

      - name: Publish beta
        if: env.IS_PRERELEASE == 'true'
        run: npm publish --access public --tag beta

      - name: Read changelog
        id: changelog
        if: env.IS_PRERELEASE == 'false'
        uses: mindsers/changelog-reader-action@v2
        with:
          version: ${{ steps.version.outputs.number }}

      - name: Read changelog (Unreleased)
        id: changelog_beta
        if: env.IS_PRERELEASE == 'true'
        uses: mindsers/changelog-reader-action@v2
        with:
          version: "Unreleased"

      - name: Create stable GitHub Release
        if: env.IS_PRERELEASE == 'false'
        run: |
          echo "$NOTES" > /tmp/release-notes.md
          gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file /tmp/release-notes.md
        env:
          GH_TOKEN: ${{ github.token }}
          NOTES: ${{ steps.changelog.outputs.changes }}

      - name: Create prerelease GitHub Release
        if: env.IS_PRERELEASE == 'true'
        run: |
          echo "$NOTES" > /tmp/release-notes.md
          gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --prerelease --notes-file /tmp/release-notes.md
        env:
          GH_TOKEN: ${{ github.token }}
          NOTES: ${{ steps.changelog_beta.outputs.changes }}
